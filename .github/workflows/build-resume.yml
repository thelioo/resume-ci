name: Build Resumes

on:
  push:
    branches: [main]
    paths:
      - "data/output/latex/*.yml"
      - "templates/**"
      - "skills/resume-manager/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Build resumes
        run: |
          python3 skills/resume-manager/scripts/build_resume.py \
            --template templates/output/latex/curriculo_template.tex \
            --output-dir data/output/latex

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: resumes-${{ github.sha }}
          path: data/output/latex/*.pdf
          retention-days: 90
