name: Build Resumes

on:
  push:
    branches: [main]
    paths:
      - "resumes/*.yml"
      - "template.tex"
      - ".github/build.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Generate LaTeX files
        run: python3 .github/build.py --tex-only

      - name: Compile PDFs
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "*.tex"
          working_directory: build
          compiler: pdflatex
          args: "-interaction=nonstopmode -halt-on-error"

      - name: Upload PDFs
        run: |
          npm install --prefix /tmp/art @actions/artifact@2 --silent
          node << 'JS'
          const { DefaultArtifactClient } = require('/tmp/art/node_modules/@actions/artifact');
          const fs = require('fs'), path = require('path');
          (async () => {
            const client = new DefaultArtifactClient();
            const pdfs = fs.readdirSync('build').filter(f => f.endsWith('.pdf'));
            for (const pdf of pdfs) {
              const name = path.basename(pdf, '.pdf');
              await client.uploadArtifact(name, ['build/' + pdf], 'build', { retentionDays: 90 });
              console.log('✓ ' + name);
            }
          })().catch(e => { console.error(e); process.exit(1); });
          JS
