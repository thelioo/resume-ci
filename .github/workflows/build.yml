name: Build Resumes

on:
  push:
    branches: [main]
    paths:
      - "resumes/*.yml"
      - "templates/**"
      - "lib/**"
      - "setup.sh"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup
        run: make setup

      - name: Build PDFs
        run: make build

      - name: Publish PDFs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${{ github.run_number }}"
          gh release create "$tag" build/*.pdf \
            --title "Resumes" \
            --notes "Built from [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
