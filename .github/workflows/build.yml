name: Build Resumes

on:
  push:
    branches: [main]
    paths:
      - "resumes/*.yml"
      - "template.tex"
      - ".github/build.py"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Generate LaTeX files
        run: python3 .github/build.py --tex-only

      - name: Compile PDFs
        uses: xu-cheng/latex-action@v3
        with:
          root_file: "*.tex"
          working_directory: build
          compiler: pdflatex
          args: "-interaction=nonstopmode -halt-on-error"

      - name: Publish PDFs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --cleanup-tag --yes 2>/dev/null || true
          gh release create latest build/*.pdf \
            --title "Latest Build" \
            --notes "Built from [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
