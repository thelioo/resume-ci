name: Build Resumes

on:
  push:
    branches: [main]
    paths:
      - "resumes/*.yml"
      - "template.tex"
      - "lib/**"
      - "lib/resume.schema.json"
      - ".github/workflows/build.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup build tools
        run: lib/setup.sh

      - name: Build PDFs
        run: lib/resume-ci.py

      - name: Publish PDFs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="build-${{ github.run_number }}"
          gh release create "$tag" build/*.pdf \
            --title "Resumes" \
            --notes "Built from [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
